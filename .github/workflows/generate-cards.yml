name: 🌐 Deploy Endfield GAS Dashboard

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "dashboard.css"
      - "dashboard.js"
      - "config.js"
      - ".github/workflows/deploy-pages.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: endfield-gas-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗️ Build static site
        run: |
          rm -rf _site
          mkdir -p _site

          cp index.html _site/index.html
          cp dashboard.css _site/dashboard.css
          cp dashboard.js _site/dashboard.js
          cp config.js _site/config.js
          cp -R assets _site/assets
          touch _site/.nojekyll

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: 🚀 Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
