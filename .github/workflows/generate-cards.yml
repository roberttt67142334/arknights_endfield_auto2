name: 🎴 Generate Endfield Profile Cards

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "dashboard.css"
      - "dashboard.js"
      - "requirements.txt"
      - "scripts/generate_cards.py"
      - ".github/workflows/generate-cards.yml"

  workflow_dispatch:

  schedule:
    - cron: "15 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: endfield-profile-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: ♻️ Restore previous cards
        uses: actions/cache@v4
        with:
          path: cards
          key: endfield-cards-${{ github.run_id }}
          restore-keys: |
            endfield-cards-

      - name: 🔐 Validate required secrets
        shell: bash
        env:
          ENDFIELD_TOKEN_MUZAKA: ${{ secrets.ENDFIELD_TOKEN_MUZAKA }}
          ENDFIELD_TOKEN_ORION: ${{ secrets.ENDFIELD_TOKEN_ORION }}
          ENDFIELD_TOKEN_NASKARA: ${{ secrets.ENDFIELD_TOKEN_NASKARA }}
        run: |
          MISSING=0
          for NAME in ENDFIELD_TOKEN_MUZAKA ENDFIELD_TOKEN_ORION ENDFIELD_TOKEN_NASKARA
          do
            if [ -z "${!NAME}" ]; then
              echo "::error title=Secret belum dibuat::$NAME kosong atau belum tersedia."
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then exit 1; fi

      - name: 🎨 Generate Profile dan Live Stats Cards
        env:
          ENDFIELD_TOKEN_MUZAKA: ${{ secrets.ENDFIELD_TOKEN_MUZAKA }}
          ENDFIELD_TOKEN_ORION: ${{ secrets.ENDFIELD_TOKEN_ORION }}
          ENDFIELD_TOKEN_NASKARA: ${{ secrets.ENDFIELD_TOKEN_NASKARA }}
        run: python scripts/generate_cards.py

      - name: 🏗️ Build GitHub Pages directory
        run: |
          rm -rf _site
          mkdir -p _site/cards

          cp index.html _site/index.html
          cp dashboard.css _site/dashboard.css
          cp dashboard.js _site/dashboard.js
          cp -R cards/. _site/cards/
          touch _site/.nojekyll

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: 🚀 Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
